name: Project Template CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 1. Spin up a temporary Postgres container
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: project_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

        # Run backend tests using the temporary DB
      - name: Run Backend Tests
        working-directory: ./server
        run: npm test
        env:
          # Route the tests to the temporary container
          VITE_DB_URI: postgresql://test_user:test_password@localhost:5432/project_test

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        run: npm run build
        env:
          # Provide a dummy URL so Vite can build successfully
          VITE_API_URL: http://localhost:3000

    # --- JOB 2: The new linting and commit checking job ---
    lint-and-format:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v3
            with:
              fetch-depth: 0 # Required to check commit history

          - name: Set up Node.js
            uses: actions/setup-node@v3
            with:
              node-version: "18.x"

          - name: Install dependencies
            working-directory: ./server # Or root, depending on where commitlint is installed
            run: npm ci

          - name: Validate Commit Messages
            run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

          - name: Check ESLint
            working-directory: ./client
            run: npm run lint

      # --- JOB 3: The CD Deployment Gatekeeper ---
      deploy:
        name: Trigger Production Deployments
        # This ensures deployment ONLY happens if both previous jobs pass
        needs: [build-and-test, lint-and-format]
        runs-on: ubuntu-latest

        # This ensures we only deploy when code is pushed/merged to main, NEVER on a pull request
        if: github.ref == 'refs/heads/main'

        steps:
          - name: Trigger Render Backend Deploy
            run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

          - name: Trigger Netlify Frontend Deploy
            run: curl -X POST -d {} ${{ secrets.NETLIFY_DEPLOY_HOOK }}
